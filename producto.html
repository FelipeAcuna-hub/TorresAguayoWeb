<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torres Aguayo — Detalle de Componente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Habilita el control por clase en la raíz <html>
        }
    </script>
</head>

<body class="bg-white text-black dark:bg-black dark:text-white antialiased font-sans flex flex-col min-h-screen transition-colors duration-300">

    <div id="header-contenedor" class="sticky top-0 z-50"></div>

    <main class="flex-grow max-w-6xl w-full mx-auto px-6 pt-12 pb-24">

        <div id="detalle-producto" class="grid grid-cols-1 md:grid-cols-2 gap-12 items-start mt-8">
            </div>

    </main>

    <div id="footer-contenedor"></div>

    <script src="config.js"></script>

    <script>
        const contenedor = document.getElementById('detalle-producto');
        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

        // 1. PERSISTENCIA DE LA CONFIGURACIÓN DE APARIENCIA
        const temaGuardado = localStorage.getItem('tema_apariencia');
        if (temaGuardado === 'dark' || (!temaGuardado && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        window.conmutarApariencia = function () {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('tema_apariencia', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('tema_apariencia', 'dark');
            }
            inicializarMenuGlobal(null);
        }

        // 2. DETALLE DINÁMICO: Capturamos el parámetro ID de la URL (?id=...)
        const urlParams = new URLSearchParams(window.location.search);
        const productoId = parseInt(urlParams.get('id'));

        async function cargarDetalle() {
            try {
                // CONSULTA A: Traer el producto maestro de Supabase
                const { data: prod, error: prodError } = await supabaseClient
                    .from('productos')
                    .select('*')
                    .eq('id', productoId)
                    .single();

                if (prodError || !prod) {
                    contenedor.innerHTML = `<p class="text-gray-500 font-mono text-xs uppercase col-span-2 text-center py-12">Componente técnico no registrado.</p>`;
                    return;
                }

                // CONSULTA B: ¡ESTA ES LA CLAVE! Trae las 4 fotos de la galería relacional
                const { data: galeria, error: galeriaError } = await supabaseClient
                    .from('imagenes_galeria')
                    .select('url')
                    .eq('producto_id', productoId);

                document.title = `${prod.nombre} — Torres Aguayo`;

                let enlacePdf = '';
                if (prod.pdf && prod.pdf !== "") {
                    enlacePdf = `
                        <a href="${prod.pdf}" target="_blank" class="inline-block text-gray-700 dark:text-gray-300 hover:text-black dark:hover:text-white font-mono text-xs tracking-wider border border-zinc-300 dark:border-zinc-800 hover:border-zinc-500 dark:hover:border-zinc-600 bg-zinc-100 dark:bg-zinc-950 px-4 py-2.5 rounded transition-colors uppercase mt-4">
                            📄 Descargar Ficha Técnica (PDF)
                        </a>
                    `;
                }

                // ARQUITECTURA DE LA GALERÍA MULTIFOTO (COLUMNA IZQUIERDA)
                let bloqueVisorImagenes = '';
                
                // Si la consulta B encontró las fotos en 'imagenes_galeria', dibuja el carrusel
                if (galeria && galeria.length > 0) {
                    let htmlMiniaturas = galeria.map((img) => `
                        <button onclick="cambiarFotoVisor('${img.url}')" class="w-20 h-20 border border-gray-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 p-1 rounded hover:border-red-500 focus:outline-none focus:border-red-500 overflow-hidden transition-all duration-200">
                            <img src="${img.url}" class="w-full h-full object-contain">
                        </button>
                    `).join('');

                    bloqueVisorImagenes = `
                        <div class="space-y-4">
                            <div class="border border-gray-200 bg-gray-50/50 dark:border-gray-900 dark:bg-gray-950/30 rounded-lg p-6 flex items-center justify-center overflow-hidden h-[380px] md:h-[450px] transition-colors">
                                <img id="foto-principal-visor" src="${prod.imagen}" alt="${prod.nombre}" class="w-full h-full object-contain rounded-md transition-all duration-300">
                            </div>
                            <div class="flex flex-wrap gap-2.5 justify-start">
                                ${htmlMiniaturas}
                            </div>
                        </div>
                    `;
                } else {
                    // Fallback de respaldo por si el ítem no tiene carrete
                    bloqueVisorImagenes = `
                        <div class="border border-gray-200 bg-gray-50/50 dark:border-gray-900 dark:bg-gray-950/30 rounded-lg p-6 flex items-center justify-center overflow-hidden h-[380px] md:h-[450px] transition-colors">
                            <img src="${prod.imagen}" alt="${prod.nombre}" class="w-full h-full object-contain rounded-md">
                        </div>
                    `;
                }

                // Inyectamos la estructura completa unificada en la grilla maestra
                contenedor.innerHTML = `
                    ${bloqueVisorImagenes}

                    <div class="space-y-6">
                        <div class="border-b border-gray-200 dark:border-gray-900 pb-4 transition-colors">
                            <span class="text-red-500 font-mono text-xs tracking-widest uppercase bg-red-500/10 px-2.5 py-1 rounded border border-red-500/20 inline-block">
                                ${prod.categoria}
                            </span>
                            <p class="text-gray-400 dark:text-gray-500 font-mono text-[11px] mt-3 uppercase tracking-wider">SKU / ID TÉCNICO: #00${prod.id}</p>
                            <h1 class="text-3xl md:text-4xl font-black tracking-tighter uppercase mt-2 text-black dark:text-white leading-tight">${prod.nombre}</h1>
                        </div>

                        <div class="text-2xl font-mono font-bold text-red-600 dark:text-red-400">
                            $${prod.precio.toLocaleString('es-CL')} <span class="text-xs text-gray-400 dark:text-gray-500 font-sans font-normal ml-1">+ IVA</span>
                        </div>

                        <div class="space-y-2">
                            <h4 class="text-xs font-mono text-gray-500 dark:text-gray-400 uppercase tracking-widest">Especificaciones Técnicas:</h4>
                            <p class="text-gray-600 dark:text-gray-400 text-sm leading-relaxed font-light">
                                ${prod.descripcion} Componente de alta precisión testeado y validado bajo estrictas normas de rendimiento para integración de flujos y diagnósticos avanzados en el ecosistema digital automotriz.
                            </p>
                        </div>

                        <div class="pt-6 border-t border-gray-200 dark:border-gray-900 space-y-4 transition-colors">
                            <button onclick="redirigirAlPago()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold text-sm tracking-widest py-4 rounded transition-all uppercase font-mono shadow-[0_4px_20px_rgba(220,38,38,0.15)]">
                                Comprar Ahora
                            </button>
                            <div>
                                ${enlacePdf}
                            </div>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error("Error cargando el detalle:", error);
            }
        }

        // LÓGICA DE INTERACCIÓN DE MINIATURAS
        window.cambiarFotoVisor = function(urlNueva) {
            const visorPrincipal = document.getElementById('foto-principal-visor');
            if (visorPrincipal) {
                visorPrincipal.style.opacity = '0'; // Efecto atenuado rápido
                setTimeout(() => {
                    visorPrincipal.src = urlNueva;
                    visorPrincipal.style.opacity = '1';
                }, 150);
            }
        }

        // Lógica de compra: añade un ítem o incrementa unidades al checkout estructurado
        window.redirigirAlPago = function () {
            let actuales = JSON.parse(localStorage.getItem('carrito_seleccion')) || [];
            
            // Si el carro viene en formato de objetos de cantidad debido a la actualización
            if (actuales.length > 0 && typeof actuales[0] === 'object') {
                const existe = actuales.find(item => item.id === productoId);
                if (!existe) {
                    actuales.push({ id: productoId, cantidad: 1 });
                } else {
                    existe.cantidad += 1; // Si ya estaba, sumamos una unidad
                }
            } else {
                // Fallback por si acaso
                if (!actuales.includes(productoId)) actuales.push(productoId);
            }
            
            localStorage.setItem('carrito_seleccion', JSON.stringify(actuales));
            window.location.href = "carrito.html";
        }

        // Arranque secuencial controlado por el motor maestro global
        inicializarMenuGlobal(null);
        cargarDetalle();
    </script>
</body>

</html>
