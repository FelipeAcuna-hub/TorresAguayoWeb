<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torres Aguayo — Catálogo Técnico</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Switch controlado por clase en la etiqueta <html>
        }
    </script>
</head>

<body class="bg-white text-black dark:bg-black dark:text-white antialiased font-sans flex flex-col min-h-screen transition-colors duration-300">

    <div id="header-contenedor" class="sticky top-0 z-50"></div>

    <main class="flex-grow max-w-6xl mx-auto px-6 pt-16 pb-32">

        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-end mb-8 border-b border-gray-200 dark:border-gray-900 pb-4 gap-4 transition-colors">
            <div>
                <span class="text-red-500 font-mono text-xs font-bold tracking-widest uppercase bg-red-500/10 px-3 py-1 rounded border border-red-500/20">
                    Componentes
                </span>
                <h1 class="text-4xl font-black tracking-tighter mt-4 uppercase italic text-black dark:text-white">
                    Catálogo <span class="text-red-500 not-italic font-light">Técnico</span>
                </h1>
            </div>
            <span id="contador-items" class="text-gray-400 dark:text-gray-500 font-mono text-xs tracking-wider">0 ITEMS MOSTRADOS</span>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-10 items-center justify-between">

            <div class="w-full md:w-72 relative">
                <input type="text" id="buscador" oninput="buscarYFiltrar()" placeholder="BUSCAR COMPONENTE..."
                    class="w-full bg-zinc-100 border border-zinc-300 dark:bg-zinc-950 dark:border-zinc-800 rounded px-4 py-2 font-mono text-xs tracking-wider text-black dark:text-white placeholder-zinc-400 dark:placeholder-zinc-600 focus:outline-none focus:border-red-500 transition uppercase">
            </div>

            <div id="contenedor-botones-filtros"
                class="flex flex-wrap gap-2 font-mono text-[11px] tracking-wider w-full md:w-auto justify-start md:justify-end">
                <button onclick="cambiarCategoria('todos')" id="btn-todos"
                    class="px-4 py-2 rounded border font-bold uppercase transition bg-black text-white border-black dark:bg-white dark:text-black dark:border-white">
                    Todos [■]
                </button>
                <button onclick="cambiarCategoria('iluminacion')" id="btn-iluminacion"
                    class="px-4 py-2 rounded border font-bold uppercase transition bg-transparent text-gray-500 border-zinc-300 dark:text-gray-400 dark:border-zinc-800 hover:text-black dark:hover:text-white hover:border-zinc-400 dark:hover:border-zinc-600">
                    Iluminación
                </button>
                <button onclick="cambiarCategoria('electronica')" id="btn-electronica"
                    class="px-4 py-2 rounded border font-bold uppercase transition bg-transparent text-gray-500 border-zinc-300 dark:text-gray-400 dark:border-zinc-800 hover:text-black dark:hover:text-white hover:border-zinc-400 dark:hover:border-zinc-600">
                    Electrónica
                </button>
                <button onclick="cambiarCategoria('accesorios')" id="btn-accesorios"
                    class="px-4 py-2 rounded border font-bold uppercase transition bg-transparent text-gray-500 border-zinc-300 dark:text-gray-400 dark:border-zinc-800 hover:text-black dark:hover:text-white hover:border-zinc-400 dark:hover:border-zinc-600">
                    Accesorios
                </button>
                <button onclick="cambiarCategoria('scanners')" id="btn-scanners"
                    class="px-4 py-2 rounded border font-bold uppercase transition bg-transparent text-gray-500 border-zinc-300 dark:text-gray-400 dark:border-zinc-800 hover:text-black dark:hover:text-white hover:border-zinc-400 dark:hover:border-zinc-600">
                    Scanners
                </button>
            </div>
        </div>

        <div id="grilla-productos" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

    </main>

    <div id="footer-contenedor"></div>

    <script src="config.js"></script>

    <script>
        const grilla = document.getElementById('grilla-productos');
        const contador = document.getElementById('contador-items');
        const buscador = document.getElementById('buscador');

        let todosLosProductos = [];
        let categoriaActiva = 'todos';

        // NORMALIZADOR LOCAL SEGURO: Garantiza que leamos siempre la estructura [{id, cantidad}]
        function obtenerEstructuraCarritoLocal() {
            let crudo = localStorage.getItem('carrito_seleccion');
            if (!crudo) return [];
            let arreglo = JSON.parse(crudo);
            if (arreglo.length > 0 && typeof arreglo[0] !== 'object') {
                return []; // Si el caché es del formato viejo, lo tratamos como vacío para evitar caídas
            }
            return arreglo;
        }

        async function cargarCatalogo() {
            try {
                const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

                const { data, error } = await supabaseClient
                    .from('productos')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;

                todosLosProductos = data;
                buscarYFiltrar();

            } catch (error) {
                console.error("Error al sincronizar con la tabla de Supabase:", error);
                grilla.innerHTML = `<p class="text-gray-500 font-mono text-xs uppercase col-span-3">Error técnico al sincronizar el catálogo.</p>`;
            }
        }

        window.buscarYFiltrar = function () {
            const textoBusqueda = buscador.value.toLowerCase().trim();

            let listaFiltrada = todosLosProductos;
            if (categoriaActiva !== 'todos') {
                listaFiltrada = listaFiltrada.filter(p => p.categoria === categoriaActiva);
            }

            if (textoBusqueda !== "") {
                listaFiltrada = listaFiltrada.filter(p =>
                    p.nombre.toLowerCase().includes(textoBusqueda) ||
                    p.descripcion.toLowerCase().includes(textoBusqueda)
                );
            }

            renderizarProductos(listaFiltrada);
        }

        window.cambiarCategoria = function (nuevaCategoria) {
            categoriaActiva = nuevaCategoria;
            const botones = ['todos', 'iluminacion', 'electronica', 'accesorios', 'scanners'];
            const esDark = document.documentElement.classList.contains('dark');

            botones.forEach(cat => {
                const btn = document.getElementById(`btn-${cat}`);
                if (cat === nuevaCategoria) {
                    btn.className = esDark
                        ? "px-4 py-2 rounded border font-bold uppercase transition bg-white text-black border-white"
                        : "px-4 py-2 rounded border font-bold uppercase transition bg-black text-white border-black";
                } else {
                    btn.className = "px-4 py-2 rounded border font-bold uppercase transition bg-transparent text-gray-500 border-zinc-300 dark:text-gray-400 dark:border-zinc-800 hover:text-black dark:hover:text-white hover:border-zinc-400 dark:hover:border-zinc-600";
                }
            });

            buscarYFiltrar();
        }

        // NUEVO MOTOR UNIFICADO: Añade de manera reactiva desde el catálogo directo
        window.agregarAlCarritoDesdeCatalogo = function(productoId) {
            const idNum = Number(productoId);
            let actuales = obtenerEstructuraCarritoLocal();
            
            const existe = actuales.find(item => Number(item.id) === idNum);
            
            if (!existe) {
                actuales.push({ id: idNum, cantidad: 1 });
            } else {
                existe.cantidad += 1;
            }
            
            localStorage.setItem('carrito_seleccion', JSON.stringify(actuales));
            actualizarBadgeHeader();
            buscarYFiltrar(); // Volvemos a dibujar para que cambie el estado visual del botón al instante
            alert("¡Componente añadido al carro de despacho!");
        }

        function actualizarBadgeHeader() {
            const badgeCarrito = document.getElementById('badge-carrito');
            const actuales = obtenerEstructuraCarritoLocal();
            if (badgeCarrito) {
                if (actuales.length > 0) {
                    badgeCarrito.innerText = `${actuales.length} SELECCIONADOS`;
                    badgeCarrito.classList.remove('scale-0');
                    badgeCarrito.classList.add('scale-100');
                } else {
                    badgeCarrito.classList.remove('scale-100');
                    badgeCarrito.classList.add('scale-0');
                }
            }
        }

        function renderizarProductos(lista) {
            contador.innerText = `${lista.length} ITEMS MOSTRADOS`;
            grilla.innerHTML = '';

            if (lista.length === 0) {
                grilla.innerHTML = `<p class="text-gray-500 font-mono text-xs uppercase col-span-3 py-8 text-center">No se encontraron componentes que coincidan.</p>`;
                return;
            }

            // Traemos el estado real del carro para pintar el estilo del botón
            const carritoActual = obtenerEstructuraCarritoLocal();

            lista.forEach(prod => {
                const displayId = prod.id.toString().slice(-4);
                
                // CORRECCIÓN: Buscamos si el ID del producto está dentro de nuestra lista de objetos del carro
                const itemEnCarro = carritoActual.find(item => Number(item.id) === Number(prod.id));
                const esSeleccionado = !!itemEnCarro; 

                const claseTarjeta = esSeleccionado
                    ? "border-red-500 bg-zinc-50 dark:bg-zinc-950 p-6 rounded-lg transition-all flex flex-col justify-between shadow-[0_0_15px_rgba(239,68,68,0.15)] relative border"
                    : "border-gray-200 bg-gray-50/50 dark:border-gray-900 dark:bg-gray-950/50 p-6 rounded-lg hover:border-red-500/30 dark:hover:border-red-500/30 transition-all group flex flex-col justify-between relative duration-300 border";

                const claseBoton = esSeleccionado
                    ? "bg-zinc-300 dark:bg-zinc-800 hover:bg-zinc-400 dark:hover:bg-zinc-700 text-red-600 dark:text-red-500 border border-red-500/30 font-bold text-xs tracking-wider px-4 py-2 rounded transition-all uppercase"
                    : "bg-black hover:bg-zinc-800 dark:bg-white dark:text-black dark:hover:bg-zinc-200 text-white font-bold text-xs tracking-wider px-4 py-2 rounded transition-all uppercase shadow-sm";

                const textoBoton = esSeleccionado ? `En Carro (${itemEnCarro.cantidad}) [+]` : "Añadir [+]";
                const etiquetaSeleccionado = esSeleccionado
                    ? `<span class="absolute top-3 right-3 bg-red-600 text-white text-[9px] font-mono font-bold px-2 py-0.5 rounded uppercase tracking-wider">Listo</span>`
                    : '';

                let botonPdf = '';
                if (prod.pdf && prod.pdf !== "") {
                    botonPdf = `
                        <a href="${prod.pdf}" target="_blank" class="block text-center bg-zinc-200 dark:bg-zinc-900 hover:bg-zinc-300 dark:hover:bg-zinc-800 text-gray-700 dark:text-gray-300 hover:text-black dark:hover:text-white font-mono text-[10px] tracking-wider py-2 rounded border border-zinc-300 dark:border-zinc-800 transition mb-3 uppercase">
                            📄 Ficha Técnica (PDF)
                        </a>
                    `;
                }

                grilla.innerHTML += `
                    <div class="${claseTarjeta}">
                        ${etiquetaSeleccionado}
                        <div>
                            <a href="producto.html?id=${prod.id}" class="block h-44 bg-zinc-200 dark:bg-neutral-900 rounded-md mb-4 border border-zinc-300 dark:border-gray-800/40 overflow-hidden flex items-center justify-center">
                                <img src="${prod.imagen}" alt="${prod.nombre}" class="w-full h-full object-contain ${esSeleccionado ? '' : 'group-hover:scale-105'} transition-transform duration-300">
                            </a>
                            
                            <div class="flex justify-between items-center mb-1">
                                <div class="text-red-500 font-mono text-[10px] tracking-widest">ID: #${displayId}</div>
                                <div class="text-zinc-400 dark:text-zinc-600 font-mono text-[9px] uppercase border border-zinc-300 dark:border-zinc-800 px-1.5 py-0.5 rounded">${prod.categoria}</div>
                            </div>
                            
                            <a href="producto.html?id=${prod.id}" class="block">
                                <h3 class="text-xl font-bold uppercase tracking-tight text-black dark:text-white mb-2 hover:text-red-500 transition">${prod.nombre}</h3>
                            </a>
                            <p class="text-gray-500 dark:text-gray-400 text-xs leading-relaxed mb-4">${prod.descripcion}</p>
                        </div>

                        <div>
                            ${botonPdf}
                            <div class="flex justify-between items-center pt-4 border-t border-gray-200 dark:border-gray-900/60">
                                <span class="text-red-500 dark:text-red-400 font-mono font-bold text-lg">$${prod.precio.toLocaleString('es-CL')}</span>
                                <button onclick="agregarAlCarritoDesdeCatalogo(${prod.id})" class="${claseBoton}">
                                    ${textoBoton}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // 5. MANEJO DE APARIENCIA LUMÍNICA
        const temaGuardado = localStorage.getItem('tema_apariencia');
        if (temaGuardado === 'dark' || (!temaGuardado && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        window.conmutarApariencia = function () {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('tema_apariencia', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('tema_apariencia', 'dark');
            }
            sincronizarEcosistema();
        }

        // 6. MOTOR DE INYECCIÓN MODULAR CENTRALIZADO
        async function sincronizarEcosistema() {
            await inicializarMenuGlobal('link-catalogo');
            actualizarBadgeHeader();
            
            // Renderizamos pie de página de forma nativa
            const respFooter = await fetch('components/footer.html');
            document.getElementById('footer-contenedor').innerHTML = await respFooter.text();
        }

        // Ejecución única de arranque limpio
        sincronizarEcosistema();
        cargarCatalogo();
    </script>

</body>

</html>
