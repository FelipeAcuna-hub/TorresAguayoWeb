<script>
    // Se mantiene intacto tu motor de verificación asíncrona limpia
    window.actualizarBotonSesionNav = async function(session) {
        const btnSesion = document.getElementById('btn-sesion-nav');
        if (!btnSesion) return;

        if (session) {
            btnSesion.innerText = "Salir [→]";
            btnSesion.className = "border border-red-500/30 bg-red-500/10 text-red-500 hover:bg-red-600 hover:text-white px-2 sm:px-2.5 py-1 rounded font-mono text-[9px] sm:text-[10px] transition uppercase font-bold tracking-wider inline-block";
        } else {
            btnSesion.innerText = "Entrar [🔑]";
            btnSesion.className = "border border-zinc-300 dark:border-zinc-800 bg-zinc-100 dark:bg-zinc-950 text-zinc-600 dark:text-zinc-400 hover:text-red-500 px-2 sm:px-2.5 py-1 rounded font-mono text-[9px] sm:text-[10px] transition uppercase font-bold tracking-wider inline-block";
        }
    };

    async function manejarFlujoSesionNav() {
        if (typeof supabase !== 'undefined' && typeof CONFIG !== 'undefined') {
            const clientHeader = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
            const { data: { session } } = await clientHeader.auth.getSession();

            if (session) {
                if (confirm("¿Deseas cerrar tu sesión activa en Torres Aguayo?")) {
                    await clientHeader.auth.signOut();
                    window.location.reload();
                }
            } else {
                window.location.href = "login.html";
            }
        }
    }
</script>
